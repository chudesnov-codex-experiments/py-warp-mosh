name: build-binaries

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  bundle:
    name: Bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        env:
          # Optional: set these as repository variables/secrets for restricted networks.
          PIP_INDEX_URL: ${{ vars.PIP_INDEX_URL }}
          PIP_EXTRA_INDEX_URL: ${{ vars.PIP_EXTRA_INDEX_URL }}
          PIP_TRUSTED_HOST: ${{ vars.PIP_TRUSTED_HOST }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools wheel
          pip install --no-build-isolation .[dev]

      - name: Build onefile executable
        run: |
          pyinstaller --onefile --name py-warp-mosh src/py_warp_mosh/cli.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: py-warp-mosh-${{ matrix.os }}
          path: |
            dist/py-warp-mosh
            dist/py-warp-mosh.exe
          if-no-files-found: error
